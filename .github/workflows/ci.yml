name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable
      - run: corepack prepare pnpm@11.8.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - run: test -f apps/docs/public/registry/index.json
